[bar/main]
width = 100%
height = 28
radius = 0
fixed-center = true

background = #222222
foreground = #dddddd

line-size = 2
padding-left = 2
padding-right = 2

module-margin = 1

font-0 = monospace:size=10;2

modules-left = xworkspaces
modules-center = date
modules-right = pulseaudio memory cpu

tray-position = right

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-foreground = #ffffff
label-active-background = #444444
label-active-padding = 2

label-occupied = %name%
label-occupied-padding = 2

label-empty = %name%
label-empty-foreground = #777777
label-empty-padding = 2

[module/date]
type = internal/date
interval = 5
date = %Y-%m-%d
time = %H:%M
label = %date% %time%

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
label-volume = VOL %percentage%%

format-muted = <label-muted>
label-muted = muted

[module/memory]
type = internal/memory
interval = 2
label = RAM %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
label = CPU %percentage%%
